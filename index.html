<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>个人资产全景管理</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" defer></script>
  <script src="app.js" defer></script>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <h1>资产配置仪表盘</h1>
          <p class="muted">跨账户、跨市场的资产统一视图</p>
        </div>
      </div>
      <div class="topbar-actions">
        <div class="fx-card">
          <div class="fx-item"><span class="flag us"></span><span>USD</span><strong id="fx-usd">6.90</strong></div>
          <div class="fx-item"><span class="flag hk"></span><span>HKD</span><strong id="fx-hkd">0.88</strong></div>
          <div class="fx-item"><span class="flag jp"></span><span>JPY</span><strong id="fx-jpy">0.04</strong></div>
        </div>
        <div class="toolbar">
          <select id="display-currency">
            <option value="CNY">CNY</option>
            <option value="USD">USD</option>
            <option value="HKD">HKD</option>
            <option value="JPY">JPY</option>
          </select>
          <button id="refresh">刷新数据</button>
          <button id="import-csv">导入 CSV</button>
          <button id="export-csv">导出 CSV</button>
        </div>
      </div>
    </header>

    <section class="section" id="accounts">
      <div class="section-header">
        <h2>账户总览</h2>
        <div class="summary">
          <div>
            <span class="label">总资产</span>
            <strong id="total-assets">¥0</strong>
          </div>
          <div>
            <span class="label">总盈亏</span>
            <strong id="total-pnl">¥0</strong>
          </div>
          <div>
            <span class="label">总本金</span>
            <strong id="total-principal">¥0</strong>
          </div>
        </div>
      </div>
      <div class="table-wrap">
        <table class="data-table" id="accounts-table">
          <thead>
            <tr>
              <th>账户名称</th>
              <th>投入本金</th>
              <th>现金价值</th>
              <th>持仓价值</th>
              <th>持仓收益</th>
              <th>账户资产</th>
              <th>累计盈亏</th>
              <th>累计收益率</th>
              <th class="actions-col">操作</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="form-row">
        <input id="account-name" placeholder="账户名称" />
        <input id="account-principal" type="number" placeholder="投入本金" />
        <input id="account-cash" type="number" placeholder="现金价值" />
        <button id="add-account">添加账户</button>
      </div>
    </section>

    <section class="section" id="dashboard">
      <div class="section-header">
        <h2>仪表盘</h2>
        <p class="muted">结构视图将根据当前持仓自动更新</p>
      </div>
      <div class="chart-grid">
        <div class="chart-card">
          <div class="chart-title">资产结构</div>
          <canvas id="chart-category"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-title">币种结构</div>
          <canvas id="chart-currency"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-title">账户结构</div>
          <canvas id="chart-account"></canvas>
        </div>
      </div>
    </section>

    <section class="section" id="holdings">
      <div class="section-header">
        <h2>持仓资产</h2>
        <p class="muted">按类别分组展示，优先使用用户分类标签</p>
      </div>

      <div class="table-wrap">
        <table class="data-table" id="assets-table">
          <thead>
            <tr>
              <th>资产名称/代码</th>
              <th>账户</th>
              <th>币种</th>
              <th>数量</th>
              <th>成本</th>
              <th>现价</th>
              <th>市值</th>
              <th>盈亏</th>
              <th>收益率</th>
              <th>分类</th>
              <th class="actions-col">操作</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="form-row">
        <div class="lookup">
          <input id="asset-search" placeholder="资产名称/代码" autocomplete="off" />
          <div id="asset-suggestions" class="suggestions"></div>
        </div>
        <select id="asset-account"></select>
        <input id="asset-qty" type="number" placeholder="数量" />
        <input id="asset-cost" type="number" placeholder="成本价" />
        <select id="asset-tag">
          <option value="">自动分类</option>
          <option value="美股">美股</option>
          <option value="港股">港股</option>
          <option value="A股">A股</option>
          <option value="日股">日股</option>
          <option value="欧股">欧股</option>
          <option value="黄金">黄金</option>
          <option value="债券">债券</option>
          <option value="基金">基金</option>
        </select>
        <button id="add-asset">添加资产</button>
      </div>

      <div class="divider"></div>

      <div class="table-wrap">
        <table class="data-table" id="trades-table">
          <thead>
            <tr>
              <th>资产</th>
              <th>交易数量</th>
              <th>交易价格</th>
              <th>日期</th>
              <th class="actions-col">操作</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="form-row">
        <select id="trade-asset"></select>
        <input id="trade-qty" type="number" placeholder="交易数量" />
        <input id="trade-price" type="number" placeholder="交易价格" />
        <input id="trade-date" type="date" />
        <button id="add-trade">添加交易</button>
      </div>
    </section>

    <footer class="footer">
      <div class="muted">数据来源：用户录入 + API 行情（可配置）</div>
    </footer>
  </div>

  <input type="file" id="csv-file" accept=".csv" hidden />
</body>
</html>
